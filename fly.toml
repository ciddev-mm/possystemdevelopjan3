# fly.toml configuration for Fly.io deployment with SQLite

app = "possystemdevelopjan3"
primary_region = "sin"

[build]

[deploy]
  # Automatically sync database schema during deployment
  release_command = "npx prisma db push"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  # Mount persistent disk for SQLite
  source = "pos_data"
  destination = "/data"

[env]
  PORT = "3000"
  DATABASE_URL = "file:/data/dev.db"
